<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a1a;
            font-family: Arial, sans-serif;
        }
        #gameContainer {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }
        #scoreBoard {
            color: #fff;
            font-size: 18px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        #gameCanvas {
            border: 4px solid #4a4a4a;
            border-radius: 8px;
            background: #2a2a2a;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }
        #gameOver {
            display: none;
            position: absolute;
            color: #fff;
            font-size: 48px;
            font-weight: bold;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.8);
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="scoreBoard">Score: 0</div>
        <canvas id="gameCanvas" width="600" height="600"></canvas>
    </div>
    <script>
	const SUPABASE_URL = 'https://ocrvwhjunnwwwafmleis.supabase.co'
	const SUPABASE_KEY = 'sb_publishable_e3REavqXO2VHLmwgE2S2aA_5xyiuDa4'
        // Setup canvas
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreBoard = document.getElementById('scoreBoard');
        // Game configuration
        const gridSize = 30;
        const cellSize = canvas.width / gridSize;
        let tickRate = 200;
        // Initialize snake - 3 segments in center, moving right
        const snake = [
            { x: 14, y: 14 },
            { x: 13, y: 14 },
            { x: 12, y: 14 }
        ];
        // Current direction
        let dx = 1;
        let dy = 0;
        // Track last direction to prevent rapid reverses
        let lastDx = 1;
        let lastDy = 0;
        // Food position
        let food = { x: 5, y: 5 };
        let obstacles = [];
        let currentLevel = 1;

 
		function generateLevel(level) {
			const generated = [];
			const segments = 2 + Math.floor((level - 1) * 1.2);
    
			for (let s = 0; s < segments; s++) {
				const isHorizontal = Math.random() > 0.5;
				const length = 5 + Math.floor(Math.random() * 8);
        
				if (isHorizontal) {
					const y = 2 + Math.floor(Math.random() * (gridSize - 4));
					const startX = 2 + Math.floor(Math.random() * (gridSize - length - 4));
					for (let i = 0; i < length; i++) {
						generated.push({ x: startX + i, y: y });
					}
				} else {
					const x = 2 + Math.floor(Math.random() * (gridSize - 4));
					const startY = 2 + Math.floor(Math.random() * (gridSize - length - 4));
					for (let i = 0; i < length; i++) {
						generated.push({ x: x, y: startY + i });
					}
				}
			}
    
			// Clear a safe zone around the snake start position
			const start = { x: 14, y: 14 };
			return generated.filter(obs => 
				Math.abs(obs.x - start.x) > 6 || Math.abs(obs.y - start.y) > 6
			);
		}
		// Game state
		let isGameRunning = true;
		let isPaused = false;
		let gameState = 'start';
		let inputQueue = [];
		let playerName = '';
		let difficulty = 3;
        let score = 0;
		let foodEaten = 0;
		let growthPending = 0;
		function loadLevel(n) {
			obstacles = n === 1 ? [] : generateLevel(n);
			currentLevel = n;
			scoreBoard.textContent = `Score: ${score} | Level: ${currentLevel}`;
		}
        // Spawn food at random valid position
        function spawnFood() {
            let valid = false;
            while (!valid) {
                food.x = Math.floor(Math.random() * gridSize);
                food.y = Math.floor(Math.random() * gridSize);
                valid = true;
                // Check if food is on snake
                for (let segment of snake) {
                    if (segment.x === food.x && segment.y === food.y) {
                        valid = false;
                        break;
                    }
                }
				// Check if food is an obstacles
				for (let obs of obstacles) {
					if (obs.x === food.x && obs.y === food.y) {
						valid = false;
						break;
					}
				}
            }
        }
        // Game loop
        let gameLoop;
        function update() {
		if (inputQueue.length > 0) {
			const next = inputQueue.shift();
			dx = next.dx;
			dy = next.dy;
		}
            // Create new head based on current direction
            const head = {
                x: snake[0].x + dx,
                y: snake[0].y + dy
            };
            // Add new head to front of snake
            snake.unshift(head);
            // Check if head is on food
            if (head.x === food.x && head.y === food.y) {
                // Snake ate food - increment score and spawn new food
                score++;
				foodEaten++;
                scoreBoard.textContent = `Score: ${score} | Level: ${currentLevel}`;
                spawnFood();
				growthPending += 6;
				
				if (foodEaten >= 9) {
					foodEaten = 0;
					const nextLevel = currentLevel + 1;
					loadLevel(nextLevel);
					tickRate = calcTickRate();
					clearInterval(gameLoop);
					gameLoop = setInterval(() => {
						if (isGameRunning && !isPaused) {
							update();
							if (isGameRunning && !isPaused) draw();
						}
					}, tickRate);
					snake.length = 0
					resetSnake();
					showLevelScreen();
					return;
				}
            } else {
                // Remove tail (normal movement)
                if (growthPending > 0) {
					growthPending--;
					} else{
						snake.pop();
				}
            }
            // Check collision with walls
            if (head.x < 0 || head.x >= gridSize || head.y < 0 || head.y >= gridSize) {
                gameOver();
                return;
            }
            // Check collision with own body (skip the tail which will move)
            for (let i = 1; i < snake.length - 1; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    gameOver();
                    return;
                }
            }
			//Check collision with obstacles
			for (let obs of obstacles) {
				if (head.x === obs.x && head.y === obs.y) {
					gameOver();
					return;
				}
			}
        }
        function draw() {
            // Clear canvas
            ctx.shadowBlur = 0;
            ctx.shadowColor = 'transparent';
            ctx.textAlign = 'left';
            ctx.fillStyle = '#2a2a2a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            // Draw obstacles
			ctx.fillStyle = '#888888';
			obstacles.forEach(obs => {
				ctx.fillRect(
					obs.x * cellSize + 1,
					obs.y * cellSize + 1,
					cellSize - 2,
					cellSize - 2
				);
			});
			// Draw snake
            snake.forEach((segment, index) => {
                // Head is slightly lighter green
                ctx.fillStyle = index === 0 ? '#6aff6a' : '#4dcf4d';
                ctx.fillRect(
                    segment.x * cellSize + 1,
                    segment.y * cellSize + 1,
                    cellSize - 2,
                    cellSize - 2
                );
            });
            // Draw food as red rectangle
            ctx.fillStyle = '#ff4444';
            ctx.fillRect(
                food.x * cellSize + 1,
                food.y * cellSize + 1,
                cellSize - 2,
                cellSize - 2
            );
            // Draw subtle food glow
            ctx.shadowColor = '#ff4444';
            ctx.shadowBlur = 10;
            ctx.fillRect(
                food.x * cellSize + 1,
                food.y * cellSize + 1,
                cellSize - 2,
                cellSize - 2
            );
            ctx.shadowBlur = 0;
        }
		function gameOver() {
			isGameRunning = false;
			clearInterval(gameLoop);
			gameState = 'gameover';
			ctx.shadowBlur = 0;
			ctx.shadowColor = 'transparent';
			ctx.fillStyle = 'rgba(0,0,0,0.85)';
			ctx.fillRect(0, 0, canvas.width, canvas.height);
			ctx.textAlign = 'center';
			ctx.fillStyle = '#ff4444';
			ctx.font = 'bold 48px Arial';
			ctx.fillText('GAME OVER', canvas.width / 2, 80);
			ctx.fillStyle = 'white';
			ctx.font = '24px Arial';
			ctx.fillText(`${playerName}  Score: ${score}  Level: ${currentLevel}`, canvas.width / 2, 130);
			ctx.fillStyle = '#6aff6a';
			ctx.font = 'bold 22px Arial';
			ctx.fillText('Saving score...', canvas.width / 2, 185);

			saveScore().then(leaderboard => {
				ctx.fillStyle = 'rgba(0,0,0,0.85)';
				ctx.fillRect(0, 0, canvas.width, canvas.height);
				ctx.textAlign = 'center';
				ctx.fillStyle = '#ff4444';
				ctx.font = 'bold 48px Arial';
				ctx.fillText('GAME OVER', canvas.width / 2, 80);
				ctx.fillStyle = 'white';
				ctx.font = '24px Arial';
				ctx.fillText(`${playerName}  Score: ${score}  Level: ${currentLevel}`, canvas.width / 2, 130);
				ctx.fillStyle = '#6aff6a';
				ctx.font = 'bold 22px Arial';
				ctx.fillText('HIGH SCORES', canvas.width / 2, 185);
				ctx.font = '18px Arial';
				leaderboard.forEach((entry, index) => {
					const isCurrentPlayer = entry.name === playerName &&
											entry.score === score &&
											entry.level === currentLevel;
					ctx.fillStyle = isCurrentPlayer ? '#6aff6a' : 'white';
					const line = `${index + 1}.  ${entry.name}  -  ${entry.score}  (Lvl ${entry.level} / Diff ${entry.difficulty})`;
					ctx.fillText(line, canvas.width / 2, 220 + index * 30);
				});
				ctx.fillStyle = '#aaaaaa';
				ctx.font = '20px Arial';
				ctx.fillText('Press R to play again', canvas.width / 2, 540);
			});
		}
		function calcTickRate() {
			return Math.min(250, Math.max(50, 500 - (difficulty - 1) * 100 - (currentLevel - 1) * 20));
				}
		function resetSnake() {
			snake.length = 0;
			snake.push(
				{ x: 14, y: 14 },
				{ x: 13, y: 14 },
				{ x: 12, y: 14 }
			);
			dx = 1;
			dy = 0;
		}
		function startGame() {
			isGameRunning = true;
			isPaused = false;
			score = 0;
			foodEaten = 0;
			growthPending = 0;
			inputQueue = [];
			snake.length = 0;
			resetSnake();
			loadLevel(1);
			spawnFood();
			tickRate = calcTickRate();
			gameLoop = setInterval(() => {
				if (isGameRunning && !isPaused) {
					update();
					if (isGameRunning && !isPaused) draw();
				}
			}, tickRate);
		}
		async function loadLeaderboard() {
			const response = await fetch(
				`${SUPABASE_URL}/rest/v1/leaderboard?order=score.desc&limit=10`,
				{
					headers: {
						'apikey': SUPABASE_KEY,
						'Authorization': `Bearer ${SUPABASE_KEY}`
					}
				}
			);
			return await response.json();
		}

		async function saveScore() {
			await fetch(`${SUPABASE_URL}/rest/v1/leaderboard`, {
				method: 'POST',
				headers: {
					'apikey': SUPABASE_KEY,
					'Authorization': `Bearer ${SUPABASE_KEY}`,
					'Content-Type': 'application/json'
				},
				body: JSON.stringify({
					name: playerName,
					score: score,
					level: currentLevel,
					difficulty: difficulty
				})
			});
			return await loadLeaderboard();
		}
		function drawStartScreen() {
			ctx.shadowBlur = 0;
			ctx.shadowColor = 'transparent';
			ctx.fillStyle = '#2a2a2a';
			ctx.fillRect(0, 0, canvas.width, canvas.height);
			ctx.textAlign = 'center';
			
			// Title 
			ctx.fillStyle = '#6aff6a';
			ctx.font = 'bold 48px Arial';
			ctx.fillText('NIBBLES - Reloaded', canvas.width / 2, 120);
			// Name prompt
			ctx.fillStyle = 'white';
			ctx.font = '24px Arial';
			ctx.fillText('Enter your name:', canvas.width / 2, 250);
			ctx.fillStyle = '#6aff6a';
			ctx.font = 'bold 24px Arial';
			ctx.fillText(playerName + '_', canvas.width / 2, 295);
    
			// Difficulty
			ctx.fillStyle = 'white';
			ctx.font = '24px Arial';
			ctx.fillText('Difficulty: ← ' + difficulty + ' →', canvas.width / 2, 380);
    
			// Start instruction
			ctx.fillStyle = '#aaaaaa';
			ctx.font = '20px Arial';
			ctx.fillText('Press ENTER to start', canvas.width / 2, 450);
}
			
		function showLevelScreen() {
			isPaused = true;
			gameState = 'paused';
			ctx.shadowBlur = 0;
			ctx.shadowColor = 'transparent';
			ctx.fillStyle = 'rgba(0,0,0,0.6)';
			ctx.fillRect(0, 0, canvas.width, canvas.height);
			ctx.fillStyle = 'white';
			ctx.font = 'bold 48px Arial';
			ctx.textAlign = 'center';
			ctx.fillText(`Level ${currentLevel}`, canvas.width / 2, canvas.height / 2);
			ctx.font = '24px Arial';
			ctx.fillText('Press any key to continue', canvas.width / 2, canvas.height / 2 + 50);
		}
        function handleKeyPress(key) {
            // Prevent 180-degree turns (can't reverse direction)
            let newDx = dx;
            let newDy = dy;
            if (key === 'ArrowUp' || key === 'w' || key === 'W') {
                newDx = 0;
                newDy = -1;
            } else if (key === 'ArrowLeft' || key === 'a' || key === 'A') {
                newDx = -1;
                newDy = 0;
            } else if (key === 'ArrowDown' || key === 's' || key === 'S') {
                newDx = 0;
                newDy = 1;
            } else if (key === 'ArrowRight' || key === 'd' || key === 'D') {
                newDx = 1;
                newDy = 0;
            } else {
                return;
            }
			// Get the last queued direction, or current direction if queue is empty
			const last = inputQueue.length > 0 ? inputQueue[inputQueue.length - 1] : { dx, dy };

			// Only queue if not reversing into last queued direction
			if (newDx !== -last.dx || newDy !== -last.dy) {
				if (inputQueue.length < 3) {
					inputQueue.push({ dx: newDx, dy: newDy });
				}
			}
        }
		window.addEventListener('keydown', (e) => {
			if (gameState === 'start') {
				if (e.key === 'Enter' && playerName.length > 0) {
					gameState = 'playing';
					startGame();
			} else if (e.key === 'ArrowLeft') {
				difficulty = Math.max(1, difficulty - 1);
				drawStartScreen();
			} else if (e.key === 'ArrowRight') {
				difficulty = Math.min(5, difficulty + 1);
				drawStartScreen();
			} else if (e.key === 'Backspace') {
				playerName = playerName.slice(0, -1);
				drawStartScreen();
			} else if (e.key.length === 1 && playerName.length < 12) {
				playerName += e.key;
				drawStartScreen();
			}
			return;
		}

		if (gameState === 'paused') {
			gameState = 'playing';
			isPaused = false;
			return;
		}

		if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key) ||
			['w', 'a', 's', 'd', 'W', 'A', 'S', 'D'].includes(e.key.toLowerCase())) {
			e.preventDefault();
			handleKeyPress(e.key);
		}
	});
		document.addEventListener('keydown', (e) => {
			if (e.key === 'r' || e.key === 'R') {
				if (gameState === 'gameover') {
					e.stopImmediatePropagation();
					gameState = 'start';
					playerName = '';
					difficulty = 3;
					loadLevel(1);
					spawnFood();
					drawStartScreen();
				}
			}
		});

        // Reset game function (optional, for replay)
        window.resetGame = function() {
            snake.length = 0
            snake.push(
                { x: 14, y: 14 },
                { x: 13, y: 14 },
                { x: 12, y: 14 }
            );
            dx = 1;
            dy = 0;
            lastDx = 1;
            lastDy = 0;
            score = 0;
            isGameRunning = true;
			isPaused = false;
            spawnFood();
			foodEaten = 0;
			loadLevel (1);
            clearInterval(gameLoop);
            gameLoop;
            draw();
            // Update score display
            scoreBoard.textContent = `Score: ${score} | Level: ${currentLevel}`;
        };
        // Initial draw
        loadLevel (1);
		spawnFood();
        drawStartScreen();
    </script>
</body>
</html>
